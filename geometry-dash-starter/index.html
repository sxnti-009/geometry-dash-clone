<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Geometry Dash - Aprendiendo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Mi primer juego tipo Geometry Dash</h1>
    <p>Presiona <strong>ESPACIO</strong> o haz <strong>clic</strong> para saltar</p>

    <!-- El canvas es la "pantalla" donde dibujamos el juego -->
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <p id="score">Puntos: 0</p>
    <p id="message"></p>

    <!-- Cargamos el JavaScript al final para que la página exista primero -->
    <script src="game.js"></script>
</body>
</html>
